<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept F: Lion badge — stylized lion silhouette inside a rounded shield, app-icon ready -->
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
  </defs>
  <!-- Rounded square (app icon shape) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgF)"/>
  <!-- Stylized lion face — geometric/angular -->
  <!-- Mane outer shape -->
  <path d="
    M256 88
    C310 88 356 100 384 132
    C412 164 420 208 420 244
    C420 310 390 360 340 394
    C310 416 280 424 256 424
    C232 424 202 416 172 394
    C122 360 92 310 92 244
    C92 208 100 164 128 132
    C156 100 202 88 256 88Z
  " fill="#40916C" opacity="0.5"/>
  <!-- Inner face -->
  <path d="
    M256 140
    C296 140 328 158 348 188
    C368 218 372 248 372 272
    C372 320 340 360 300 380
    C280 392 268 396 256 396
    C244 396 232 392 212 380
    C172 360 140 320 140 272
    C140 248 144 218 164 188
    C184 158 216 140 256 140Z
  " fill="#52B788"/>
  <!-- Eyes -->
  <ellipse cx="212" cy="248" rx="20" ry="16" fill="#F0EBE3"/>
  <ellipse cx="300" cy="248" rx="20" ry="16" fill="#F0EBE3"/>
  <ellipse cx="216" cy="248" rx="10" ry="12" fill="#1B4332"/>
  <ellipse cx="304" cy="248" rx="10" ry="12" fill="#1B4332"/>
  <!-- Eye shine -->
  <circle cx="220" cy="244" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="308" cy="244" r="4" fill="#fff" opacity="0.8"/>
  <!-- Nose -->
  <path d="M244 296 L268 296 L256 312 Z" fill="#1B4332"/>
  <!-- Mouth -->
  <path d="M240 316 Q256 332 272 316" fill="none" stroke="#1B4332" stroke-width="3" stroke-linecap="round"/>
  <!-- Ears (triangles poking out of mane) -->
  <path d="M160 160 L192 120 L208 172 Z" fill="#52B788"/>
  <path d="M352 160 L320 120 L304 172 Z" fill="#52B788"/>
  <!-- Inner ear -->
  <path d="M172 158 L192 132 L204 168 Z" fill="#D4A373" opacity="0.5"/>
  <path d="M340 158 L320 132 L308 168 Z" fill="#D4A373" opacity="0.5"/>
  <!-- Crown mark on forehead -->
  <path d="M236 200 L256 180 L276 200" fill="none" stroke="#D4A373" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
