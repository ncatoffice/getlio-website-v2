  <circle cx="222" cy="236" r="2.5" fill="#fff"/>
  <circle cx="302" cy="236" r="2.5" fill="#fff"/>
  <!-- Crown / Mane rays -->
  <path d="M256 60 L270 100 L256 90 L242 100 Z" fill="#D4A373"/>
  <path d="M170 100 L195 130 L178 127 L168 145 Z" fill="#D4A373"/>
  <path d="M342 100 L317 130 L334 127 L344 145 Z" fill="#D4A373"/>
  <path d="M120 170 L155 185 L142 190 L140 210 Z" fill="#D4A373"/>
