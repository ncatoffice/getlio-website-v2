<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept A: Geometric Lion Profile — minimal, bold, one continuous shape -->
  <defs>
    <linearGradient id="maneA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
  </defs>
  <!-- Mane circle -->
  <circle cx="256" cy="240" r="180" fill="url(#maneA)"/>
  <!-- Face (lighter inset) -->
  <circle cx="256" cy="260" r="120" fill="#40916C"/>
  <!-- Snout -->
  <ellipse cx="256" cy="310" rx="50" ry="35" fill="#52B788"/>
  <!-- Nose -->
  <path d="M248 298 L264 298 L256 310 Z" fill="#1B4332"/>
  <!-- Eyes -->
